openapi: 3.1.0
info:
  title: Infographic Workspace API
  version: 2.2.0
paths:
  /api/v1/projects:
    get:
      responses:
        '200': { description: OK }
    post:
      responses:
        '201': { description: Created }
  /api/v1/projects/{projectId}:
    get:
      responses:
        '200': { description: OK }
  /api/v1/projects/{projectId}/documents:
    post:
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Chỉ hỗ trợ PDF hoặc TXT.
      responses:
        '202': { description: Accepted }
  /api/v1/projects/{projectId}/text:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_text]
              properties:
                raw_text:
                  type: string
                  minLength: 10
      responses:
        '202': { description: Accepted }
  /api/v1/projects/{projectId}/processing:
    post:
      responses:
        '202': { description: Accepted }
components:
  schemas:
    ProjectStatus:
      type: string
      enum: [draft, uploaded, extracting, extracted, failed]
    DocumentStatus:
      type: string
      enum: [uploaded, extracting, extracted, failed]
