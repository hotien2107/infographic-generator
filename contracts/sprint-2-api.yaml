openapi: 3.1.0
info:
  title: AI Infographic Generator Sprint 2 API Contract
  version: 2.0.0
  summary: Contract cho document ingestion + processing lifecycle giả lập.
  description: |
    Sprint 2 mở rộng từ flow upload tài liệu của Sprint 1 để tạo nền tảng cho AI pipeline.
    Backend giữ response envelope thống nhất: { data, error, meta }.
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Projects
  - name: Documents
  - name: Processing

paths:
  /api/v1/projects:
    post:
      tags: [Projects]
      summary: Tạo project mới
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Tạo project thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Lấy chi tiết project, tài liệu và processing summary
      operationId: getProjectById
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Lấy project thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/ProjectNotFound'

  /api/v1/projects/{projectId}/documents:
    post:
      tags: [Documents]
      summary: Upload tài liệu và tự động đưa vào luồng xử lý nếu bật auto-processing
      operationId: uploadProjectDocument
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadDocumentRequest'
      responses:
        '202':
          description: Upload thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingEnvelope'
        '400':
          description: File không hợp lệ hoặc multipart không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/ProjectNotFound'

  /api/v1/projects/{projectId}/processing:
    post:
      tags: [Processing]
      summary: Đưa document mới nhất vào queue xử lý thủ công
      operationId: triggerProjectProcessing
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '202':
          description: Enqueue processing thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: Không tìm thấy project hoặc document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Dữ liệu không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ProjectNotFound:
      description: Project không tồn tại
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    EnvelopeMeta:
      type: object
      additionalProperties: false
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
      required: [request_id, timestamp]

    ErrorDetail:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - INVALID_FILE_TYPE
            - FILE_TOO_LARGE
            - PROJECT_NOT_FOUND
            - DOCUMENT_NOT_FOUND
            - ROUTE_NOT_FOUND
            - PROJECT_CREATE_FAILED
            - PERSISTENCE_ERROR
        message:
          type: string
        field:
          type:
            - string
            - 'null'
      required: [code, message, field]

    ErrorEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorDetail'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
      required: [data, error, meta]

    CreateProjectRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 120
        input_mode:
          type: string
          enum: [file, text]
      required: [title, input_mode]

    ProjectStatus:
      type: string
      enum: [draft, uploaded, processing, processed, failed]

    ProjectStep:
      type: string
      enum:
        - waiting_for_upload
        - uploaded
        - queued_for_processing
        - extracting
        - ready_for_generation
        - failed

    DocumentStatus:
      type: string
      enum: [uploaded, queued, processing, processed, failed]

    ProcessingSummary:
      type: object
      additionalProperties: false
      properties:
        total_documents:
          type: integer
        uploaded_documents:
          type: integer
        queued_documents:
          type: integer
        processing_documents:
          type: integer
        processed_documents:
          type: integer
        failed_documents:
          type: integer
        last_processed_at:
          type:
            - string
            - 'null'
          format: date-time
        last_error:
          type:
            - string
            - 'null'
      required:
        - total_documents
        - uploaded_documents
        - queued_documents
        - processing_documents
        - processed_documents
        - failed_documents
        - last_processed_at
        - last_error

    Project:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        input_mode:
          type: string
          enum: [file, text]
        status:
          $ref: '#/components/schemas/ProjectStatus'
        current_step:
          $ref: '#/components/schemas/ProjectStep'
        processing_summary:
          $ref: '#/components/schemas/ProcessingSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - input_mode
        - status
        - current_step
        - processing_summary
        - created_at
        - updated_at

    Document:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        filename:
          type: string
        mime_type:
          type: string
          enum:
            - application/pdf
            - application/vnd.openxmlformats-officedocument.wordprocessingml.document
            - text/plain
        size_bytes:
          type: integer
          minimum: 1
        storage_key:
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        processing_started_at:
          type:
            - string
            - 'null'
          format: date-time
        processing_finished_at:
          type:
            - string
            - 'null'
          format: date-time
        error_message:
          type:
            - string
            - 'null'
        extracted_text_preview:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - filename
        - mime_type
        - size_bytes
        - storage_key
        - status
        - processing_started_at
        - processing_finished_at
        - error_message
        - extracted_text_preview
        - created_at
        - updated_at

    ProjectDetailResponse:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          additionalProperties: false
          properties:
            documents:
              type: array
              items:
                $ref: '#/components/schemas/Document'
          required: [documents]

    UploadDocumentRequest:
      type: object
      additionalProperties: false
      properties:
        file:
          type: string
          format: binary
        original_filename:
          type: string
      required: [file]

    ProcessingResponse:
      type: object
      additionalProperties: false
      properties:
        project:
          $ref: '#/components/schemas/Project'
        document:
          $ref: '#/components/schemas/Document'
      required: [project, document]

    ProjectEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/Project'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
      required: [data, error, meta]

    ProjectDetailEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/ProjectDetailResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
      required: [data, error, meta]

    ProcessingEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/ProcessingResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/EnvelopeMeta'
      required: [data, error, meta]
